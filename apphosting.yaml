runConfig:
  region: us-central1
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0   # scale to zero when idle — cost efficient

env:
  # ── Public Firebase client config (safe to expose) ───────────────────────────
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    availability: [BUILD, RUNTIME]

  # ── Stripe publishable key (public) ──────────────────────────────────────────
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    availability: [BUILD, RUNTIME]

  # ── Production base URL ───────────────────────────────────────────────────────
  - variable: NEXT_PUBLIC_BASE_URL
    availability: [BUILD, RUNTIME]

  # ── Firebase Admin — non-secret fields ───────────────────────────────────────
  - variable: FIREBASE_ADMIN_PROJECT_ID
    availability: [RUNTIME]

  # ── Secrets (stored in Firebase Secret Manager, never in this file) ──────────
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: firebase-admin-client-email
    availability: [RUNTIME]

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: firebase-admin-private-key
    availability: [RUNTIME]

  - variable: STRIPE_SECRET_KEY
    secret: stripe-secret-key
    availability: [RUNTIME]

  - variable: STRIPE_WEBHOOK_SECRET
    secret: stripe-webhook-secret
    availability: [RUNTIME]

  - variable: EMAIL_HOST
    secret: email-host
    availability: [RUNTIME]

  - variable: EMAIL_USER
    secret: email-user
    availability: [RUNTIME]

  - variable: EMAIL_PASS
    secret: email-pass
    availability: [RUNTIME]

  - variable: EMAIL_PORT
    secret: email-port
    availability: [RUNTIME]

  - variable: ADMIN_PROMOTION_SECRET
    secret: admin-promotion-secret
    availability: [RUNTIME]
